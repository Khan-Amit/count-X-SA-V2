name: Update Database

on:
  schedule:
    - cron: '0 0 1 */3 *'   # Runs at midnight on the 1st day of every 3rd month
  workflow_dispatch:         # Allows you to manually trigger from GitHub website (phone)

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run update script
        run: node update-engine.js
      - name: Commit changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add database.json
          git diff --staged --quiet || git commit -m "Auto-update database $(date +'%Y-%m-%d')"
          git push
